<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameBook Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <div class="contenitore">
    <h1>👋 Bentornato</h1>
    <p>Accedi al tuo account per continuare</p>

    <div class="form">
      <label>Email</label>
      <input type="email" id="email" placeholder="la-tua@email.com" />

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <button id="btn-login">Accedi</button>

      <p id="messaggio"></p>

      <p class="link">Non hai un account? <a href="registrati.html">Registrati</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="darkmode.js"></script>
  <script src="script.js"></script>
</body>
</html>
