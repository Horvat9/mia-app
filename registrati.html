<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <div class="contenitore">
    <h1>✨ Crea account</h1>
    <p>Registrati per iniziare a scrivere</p>

    <div class="form">
      <label>Email</label>
      <input type="email" id="email" placeholder="la-tua@email.com" />

      <label>Password</label>
      <input type="password" id="password" placeholder="Minimo 6 caratteri" />

      <label>Conferma password</label>
      <input type="password" id="password2" placeholder="Ripeti la password" />

      <button id="btn-registrati">Crea account</button>

      <p id="messaggio"></p>

      <p class="link">Hai già un account? <a href="index.html">Accedi</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="darkmode.js"></script>
  <script src="registrati.js"></script>
</body>
</html>
